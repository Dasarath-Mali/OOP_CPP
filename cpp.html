<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C++ Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e14;
    --surface: #131720;
    --surface2: #1a2030;
    --border: rgba(99,163,255,0.12);
    --border2: rgba(99,163,255,0.22);
    --accent: #4f9eff;
    --accent2: #7ec8ff;
    --accent3: #a78bfa;
    --green: #34d399;
    --amber: #fbbf24;
    --coral: #f87171;
    --text: #e8edf5;
    --text2: #8b96aa;
    --text3: #4e5a6e;
    --code-bg: #090d14;
    --tag-easy: rgba(52,211,153,0.12);
    --tag-easy-t: #34d399;
    --tag-mid: rgba(251,191,36,0.12);
    --tag-mid-t: #fbbf24;
    --tag-hard: rgba(248,113,113,0.12);
    --tag-hard-t: #f87171;
    --radius: 10px;
    --radius-lg: 16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

  /* LAYOUT */
  .app{display:flex;min-height:100vh}
  .sidebar{width:260px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;overflow-y:auto;z-index:100;transition:transform .3s}
  .sidebar-header{padding:20px 18px 12px;border-bottom:1px solid var(--border)}
  .sidebar-logo{font-size:18px;font-weight:800;letter-spacing:-0.5px}
  .sidebar-logo span{color:var(--accent)}
  .sidebar-sub{font-size:11px;color:var(--text3);font-weight:400;margin-top:2px;letter-spacing:0.5px;text-transform:uppercase}
  .sidebar-nav{padding:12px 10px}
  .unit-btn{width:100%;background:none;border:none;cursor:pointer;padding:8px 10px;border-radius:var(--radius);text-align:left;display:flex;align-items:center;gap:10px;color:var(--text2);font-family:'Sora',sans-serif;font-size:13px;transition:all .2s;margin-bottom:2px}
  .unit-btn:hover{background:rgba(79,158,255,0.07);color:var(--text)}
  .unit-btn.active{background:rgba(79,158,255,0.13);color:var(--accent);font-weight:600}
  .unit-num{width:22px;height:22px;border-radius:6px;background:var(--surface2);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text3);transition:all .2s}
  .unit-btn.active .unit-num{background:var(--accent);color:#fff}
  .unit-title{line-height:1.3}

  /* MAIN */
  .main{margin-left:260px;flex:1;min-height:100vh}
  .topbar{position:sticky;top:0;z-index:50;background:rgba(11,14,20,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:12px}
  .hamburger{display:none;background:none;border:none;color:var(--text);cursor:pointer;font-size:20px;padding:4px}
  .breadcrumb{font-size:13px;color:var(--text2)}
  .breadcrumb strong{color:var(--text);font-weight:600}
  .search-wrap{margin-left:auto;position:relative}
  .search-inp{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 32px;color:var(--text);font-family:'Sora',sans-serif;font-size:13px;width:200px;outline:none;transition:all .2s}
  .search-inp:focus{border-color:var(--accent);width:260px}
  .search-inp::placeholder{color:var(--text3)}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}

  .content{padding:32px 36px;max-width:900px}

  /* UNIT HERO */
  .unit-hero{margin-bottom:32px}
  .unit-hero-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(79,158,255,0.1);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px;margin-bottom:12px}
  .unit-hero h1{font-size:28px;font-weight:800;letter-spacing:-1px;line-height:1.2;margin-bottom:8px}
  .unit-hero p{color:var(--text2);font-size:14px;max-width:600px}
  .unit-stats{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}
  .stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px}
  .stat-pill span{color:var(--text);font-weight:600}

  /* SECTION */
  .section{margin-bottom:12px;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface)}
  .section-header{padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none;transition:background .2s}
  .section-header:hover{background:rgba(255,255,255,0.025)}
  .section-tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;flex-shrink:0}
  .tag-short{background:var(--tag-easy);color:var(--tag-easy-t)}
  .tag-medium{background:var(--tag-mid);color:var(--tag-mid-t)}
  .tag-long{background:var(--tag-hard);color:var(--tag-hard-t)}
  .section-title{font-size:14px;font-weight:600;flex:1}
  .section-marks{font-size:12px;color:var(--text3)}
  .chevron{width:16px;height:16px;flex-shrink:0;color:var(--text3);transition:transform .25s}
  .section.open .chevron{transform:rotate(180deg)}
  .section-body{display:none;border-top:1px solid var(--border);padding:0}
  .section.open .section-body{display:block}

  /* QUESTION */
  .question-card{padding:16px 18px;border-bottom:1px solid var(--border)}
  .question-card:last-child{border-bottom:none}
  .q-label{font-size:11px;font-weight:700;letter-spacing:0.5px;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
  .q-text{font-size:14px;color:var(--text2);margin-bottom:12px;font-weight:400}
  .answer-btn{background:rgba(79,158,255,0.08);border:1px solid rgba(79,158,255,0.2);border-radius:8px;color:var(--accent);font-family:'Sora',sans-serif;font-size:12px;font-weight:600;padding:6px 14px;cursor:pointer;transition:all .2s;margin-bottom:0}
  .answer-btn:hover{background:rgba(79,158,255,0.15)}
  .answer-content{display:none;margin-top:14px}
  .answer-content.visible{display:block}
  .answer-text{font-size:14px;color:var(--text);line-height:1.8;margin-bottom:12px}
  .answer-text strong{color:var(--accent2);font-weight:600}
  .answer-text ul{padding-left:18px;margin:8px 0}
  .answer-text li{margin-bottom:5px;color:var(--text2)}

  /* CODE */
  .code-block{position:relative;margin:12px 0;border-radius:10px;overflow:hidden;border:1px solid rgba(99,163,255,0.1)}
  .code-header{background:#0d1117;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(99,163,255,0.08)}
  .code-lang{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase}
  .copy-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;font-family:'Sora',sans-serif;font-weight:600;padding:2px 8px;border-radius:4px;transition:all .2s}
  .copy-btn:hover{background:rgba(255,255,255,0.05);color:var(--text)}
  pre{background:var(--code-bg);padding:16px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;tab-size:2}
  .kw{color:#c792ea}
  .ty{color:#82aaff}
  .fn{color:#82b1ff}
  .str{color:#c3e88d}
  .cm{color:#546e7a;font-style:italic}
  .num{color:#f78c6c}
  .pp{color:#c792ea}
  .op{color:#89ddff}

  /* DEFINITION BOX */
  .def-box{background:rgba(79,158,255,0.05);border:1px solid rgba(79,158,255,0.15);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:12px 16px;margin:10px 0;font-size:13.5px;color:var(--text)}
  .def-box strong{color:var(--accent2);display:block;margin-bottom:4px;font-size:12px;text-transform:uppercase;letter-spacing:0.5px}

  /* TABS */
  .tab-strip{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 18px;background:var(--surface);overflow-x:auto}
  .tab-btn{background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;font-family:'Sora',sans-serif;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .2s;margin-bottom:-1px}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab-content{display:none;padding:18px}
  .tab-content.active{display:block}

  /* MOBILE */
  @media(max-width:768px){
    .sidebar{transform:translateX(-100%)}
    .sidebar.open{transform:translateX(0)}
    .main{margin-left:0}
    .hamburger{display:block}
    .content{padding:20px 16px}
    .unit-hero h1{font-size:22px}
    .search-wrap{display:none}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99}
    .overlay.show{display:block}
  }
  @media(min-width:769px){.overlay{display:none!important}}

  /* PROGRESS */
  .progress-wrap{margin-bottom:28px}
  .progress-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:flex;justify-content:space-between}
  .progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .4s}

  /* HIGHLIGHT */
  .highlight-match{background:rgba(251,191,36,0.25);color:var(--amber);border-radius:2px}

  .scroll-top{position:fixed;bottom:24px;right:24px;background:var(--accent);border:none;border-radius:50%;width:40px;height:40px;color:#fff;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(79,158,255,0.3);z-index:200}
  .scroll-top.visible{display:flex}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="app">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">C<span>++</span> Study</div>
    <div class="sidebar-sub">Complete Exam Prep</div>
  </div>
  <nav class="sidebar-nav" id="unit-nav"></nav>
</aside>

<div class="main">
  <div class="topbar">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="breadcrumb" id="breadcrumb"><strong>Select a Unit</strong></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-inp" id="search-inp" placeholder="Search topics..." oninput="handleSearch(this.value)">
    </div>
  </div>
  <div class="content" id="content">
    <div style="padding:60px 0;text-align:center">
      <div style="font-size:48px;margin-bottom:16px">📘</div>
      <div style="font-size:22px;font-weight:800;margin-bottom:8px">Pick a Unit to Start</div>
      <div style="color:var(--text2);font-size:14px">All 5 units · Theory + Code · Exam Ready</div>
    </div>
  </div>
</div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const UNITS = [
  {
    id:1, title:"OOP & C++ Basics",
    desc:"Fundamentals of OOP concepts, C++ syntax, memory management, and functions.",
    sections:[
      {type:"short",marks:"1-3",title:"Core OOP Concepts",questions:[
        {q:"Define Abstraction, Encapsulation, Inheritance, and Polymorphism.",
         tabs:[
          {label:"Theory",html:`<div class="answer-text">
            <div class="def-box"><strong>Abstraction</strong>Hiding complex implementation details and showing only the essential features. Example: You use a car (drive, brake) without knowing engine internals.</div>
            <div class="def-box"><strong>Encapsulation</strong>Bundling data (variables) and methods (functions) together in a class, and restricting direct access using access specifiers (private/public/protected).</div>
            <div class="def-box"><strong>Inheritance</strong>A mechanism by which a derived class acquires properties and behaviors of a base class. Promotes code reuse.</div>
            <div class="def-box"><strong>Polymorphism</strong>The ability of an entity to take many forms. A single function/operator behaves differently based on context (compile-time or run-time).</div>
          </div>`},
         ]
        },
        {q:"Explain the Object-Oriented World View — Agents, Communities, Messages, Methods.",
         tabs:[
          {label:"Theory",html:`<div class="answer-text">
            <ul>
              <li><strong>Agents (Objects):</strong> Independent, self-contained units with state and behavior. Everything is an object.</li>
              <li><strong>Communities:</strong> Objects work together to solve problems, just like people in a society.</li>
              <li><strong>Messages:</strong> Objects communicate by sending messages — i.e., calling each other's methods.</li>
              <li><strong>Methods:</strong> The actions an object can perform, defined inside the class (functions).</li>
            </ul>
          </div>`},
         ]
        },
        {q:"List and explain C++ storage classes: auto, register, static, extern.",
         tabs:[
          {label:"Theory",html:`<div class="answer-text">
            <div class="def-box"><strong>auto</strong>Default for local variables. Scope is the block in which declared. Memory allocated on stack.</div>
            <div class="def-box"><strong>register</strong>Suggests the compiler store the variable in a CPU register for fast access. Rarely used today.</div>
            <div class="def-box"><strong>static</strong>Retains value between function calls. Initialized only once. Scope is local but lifetime is entire program.</div>
            <div class="def-box"><strong>extern</strong>Declares a variable defined in another file. Used for global variable sharing across multiple files.</div>
          </div>`},
          {label:"Code",html:`<div class="code-block"><div class="code-header"><span class="code-lang">C++</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="pp">#include</span> <span class="str">&lt;iostream&gt;</span>
<span class="kw">using namespace</span> std;

<span class="kw">void</span> <span class="fn">counter</span>() {
    <span class="kw">static int</span> count <span class="op">=</span> <span class="num">0</span>;  <span class="cm">// static: retains value</span>
    count<span class="op">++</span>;
    cout <span class="op">&lt;&lt;</span> <span class="str">"Count: "</span> <span class="op">&lt;&lt;</span> count <span class="op">&lt;&lt;</span> endl;
}

<span class="kw">int</span> <span class="fn">main</span>() {
    counter(); <span class="cm">// Count: 1</span>
    counter(); <span class="cm">// Count: 2</span>
    counter(); <span class="cm">// Count: 3</span>
    <span class="kw">return</span> <span class="num">0</span>;
}</pre></div>`},
         ]
        },
        {q:"Explain type conversion and the difference between pass by value vs pass by reference.",
         tabs:[
          {label:"Theory",html:`<div class="answer-text">
            <strong>Type Conversion:</strong>
            <ul><li><strong>Implicit:</strong> Compiler auto-converts (int → float)</li><li><strong>Explicit (Casting):</strong> Programmer forces: <code>(float)x</code> or <code>static_cast&lt;float&gt;(x)</code></li></ul>
            <br><strong>Pass by Value vs Reference:</strong>
            <ul><li><strong>By Value:</strong> A copy is made. Changes don't affect original.</li><li><strong>By Reference:</strong> Actual variable is passed. Changes affect original. More efficient for large objects.</li></ul>
          </div>`},
          {label:"Code",html:`<div class="code-block"><div class="code-header"><span class="code-lang">C++</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="kw">void</span> <span class="fn">byValue</span>(<span class="kw">int</span> x) { x <span class="op">=</span> <span class="num">100</span>; }     <span class="cm">// original unchanged</span>
<span class="kw">void</span> <span class="fn">byRef</span>(<span class="kw">int</span> <span class="op">&</span>x)  { x <span class="op">=</span> <span class="num">100</span>; }     <span class="cm">// original IS changed</span>

<span class="kw">int</span> <span class="fn">main</span>() {
    <span class="kw">int</span> a <span class="op">=</span> <span class="num">5</span>;
    byValue(a); <span class="cm">// a still = 5</span>
    byRef(a);   <span class="cm">// a now = 100</span>

    <span class="cm">// Type conversion</span>
    <span class="kw">int</span> i <span class="op">=</span> <span class="num">7</span>;
    <span class="kw">float</span> f <span class="op">=</span> (<span class="kw">float</span>)i;  <span class="cm">// explicit cast</span>
    <span class="kw">double</span> d <span class="op">=</span> i;       <span class="cm">// implicit promotion</span>
    <span class="kw">return</span> <span class="num">0</span>;
}</pre></div>`},
         ]
        },
      ]},
      {type:"medium",marks:"4-6",title:"Decision Making, Arrays & Dynamic Memory",questions:[
        {q:"Compare Procedural Programming with Object-Oriented Programming.",
         tabs:[
          {label:"Theory",html:`<div class="answer-text">
            <ul>
              <li><strong>Procedural:</strong> Program is a sequence of instructions. Data and functions are separate. Focus is on <em>what to do</em>.</li>
              <li><strong>OOP:</strong> Program is a collection of interacting objects. Data and functions are bundled together. Focus is on <em>who does what</em>.</li>
              <li><strong>Key OOP Advantages:</strong> Reusability (inheritance), security (encapsulation), extensibility (polymorphism), real-world modeling.</li>
            </ul>
          </div>`},
         ]
        },
        {q:"Explain decision-making and looping constructs with syntax examples.",
         tabs:[
          {label:"Code",html:`<div class="code-block"><div class="code-header"><span class="code-lang">C++</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="cm">// DECISION MAKING</span>
<span class="kw">if</span> (x <span class="op">&gt;</span> <span class="num">0</span>) { <span class="cm">/* positive */</span> }
<span class="kw">else if</span> (x <span class="op">&lt;</span> <span class="num">0</span>) { <span class="cm">/* negative */</span> }
<span class="kw">else</span> { <span class="cm">/* zero */</span> }

<span class="kw">switch</span>(day) {
    <span class="kw">case</span> <span class="num">1</span>: cout <span class="op">&lt;&lt;</span> <span class="str">"Monday"</span>; <span class="kw">break</span>;
    <span class="kw">default</span>: cout <span class="op">&lt;&lt;</span> <span class="str">"Other"</span>;
}

<span class="cm">// LOOPS</span>
<span class="kw">for</span>(<span class="kw">int</span> i<span class="op">=</span><span class="num">0</span>; i<span class="op">&lt;</span><span class="num">5</span>; i<span class="op">++</span>) cout <span class="op">&lt;&lt;</span> i;

<span class="kw">while</span>(n <span class="op">&gt;</span> <span class="num">0</span>) { cout <span class="op">&lt;&lt;</span> n; n<span class="op">--</span>; }

<span class="kw">do</span> { cout <span class="op">&lt;&lt;</span> n; n<span class="op">--</span>; } <span class="kw">while</span>(n <span class="op">&gt;</span> <span class="num">0</span>);

<span class="cm">// TERNARY</span>
<span class="kw">int</span> max <span class="op">=</span> (a <span class="op">&gt;</span> b) ? a : b;</pre></div>`},
         ]
        },
        {q:"Write a snippet demonstrating dynamic memory management using new and delete.",
         tabs:[
          {label:"Theory",html:`<div class="answer-text"><ul><li><strong>new</strong> allocates memory on the heap at runtime.</li><li><strong>delete</strong> frees that memory. Forgetting this causes memory leaks.</li><li><strong>new[]</strong> and <strong>delete[]</strong> are used for arrays.</li></ul></div>`},
          {label:"Code",html:`<div class="code-block"><div class="code-header"><span class="code-lang">C++</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="pp">#include</span> <span class="str">&lt;iostream&gt;</span>
<span class="kw">using namespace</span> std;

<span class="kw">int</span> <span class="fn">main</span>() {
    <span class="cm">// Single variable on heap</span>
    <span class="kw">int</span> <span class="op">*</span>p <span class="op">=</span> <span class="kw">new int</span>;
    <span class="op">*</span>p <span class="op">=</span> <span class="num">42</span>;
    cout <span class="op">&lt;&lt;</span> <span class="str">"Value: "</span> <span class="op">&lt;&lt;</span> <span class="op">*</span>p <span class="op">&lt;&lt;</span> endl;
    <span class="kw">delete</span> p;    <span class="cm">// free memory</span>

    <span class="cm">// Dynamic array</span>
    <span class="kw">int</span> n <span class="op">=</span> <span class="num">5</span>;
    <span class="kw">int</span> <span class="op">*</span>arr <span class="op">=</span> <span class="kw">new int</span>[n];
    <span class="kw">for</span>(<span class="kw">int</span> i<span class="op">=</span><span class="num">0</span>; i<span class="op">&lt;</span>n; i<span class="op">++</span>) arr[i] <span class="op">=</span> i<span class="op">*</span><span class="num">10</span>;
    <span class="kw">for</span>(<span class="kw">int</span> i<span class="op">=</span><span class="num">0</span>; i<span class="op">&lt;</span>n; i<span class="op">++</span>) cout <span class="op">&lt;&lt;</span> arr[i] <span class="op">&lt;&lt;</span> <span class="str">" "</span>;
    <span class="kw">delete</span>[] arr; <span class="cm">// use delete[] for arrays</span>
    <span class="kw">return</span> <span class="num">0</span>;
}</pre></div>`},
         ]
        },
      ]},
      {type:"long",marks:"7-10",title:"Full Programs",questions:[
        {q:"Write a complete C++ program using functions with reference arguments and return values.",
         tabs:[
          {label:"Code",html:`<div class="code-block"><div class="code-header"><span class="code-lang">C++</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div><pre><span class="pp">#include</span> <span class="str">&lt;iostream&gt;</span>
<span class="kw">using namespace</span> std;

<span class="cm">// Function with reference args — swaps two numbers</span>
<span class="kw">void</span> <span class="fn">swap</span>(<span class="kw">int</span> <span class="op">&</span>a, <span class="kw">int</span> <span class="op">&</span>b) {
    <span class="kw">int</span> temp <span class="op">=</span> a;
    a <span class="op">=</span> b;
    b <span class="op">=</span> temp;
}

<span class="cm">// Function returning a value</span>

            <li>Cannot change precedence or associativity of operators.</li>
            <li>Overloading can reduce code readability if misused.</li>
            <li>At least one operand must be a user-defined type.</li>

<span class="kw">class</span> <span class="ty">B</span> : <span class="kw">virtual public</span> <span class="ty">A</span> {};  <span class="cm">// virtual inheritance</span>
<span class="kw">class</span> <span class="ty">C</span> : <span class="kw">virtual public</span> <span class="ty">A</span> {};  <span class="cm">// virtual inheritance</span>

<span class="kw">class</span> <span class="ty">D</span> : <span class="kw">public</span> <span class="ty">B</span>, <span class="kw">public</span> <span class="ty">C</span> {};

<span class="kw">int</span> <span class="fn">main</span>() {
    <span class="ty">D</span> obj;
    obj.show();  <span class="cm">// No ambiguity! Only ONE copy of A</span>
    <span class="kw">return</span> <span class="num">0</span>;
}
<span class="cm">/* Without virtual: obj.show() would be ERROR
   "ambiguous request for member A::show" */</span></pre></div>`},

function buildNav() {
  const nav = document.getElementById('unit-nav');
  UNITS.forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'unit-btn';
    btn.id = 'nav-'+u.id;
    btn.innerHTML = `<span class="unit-num">${u.id}</span><span class="unit-title">${u.title}</span>`;
    btn.onclick = () => loadUnit(u.id);
    nav.appendChild(btn);
  });
}

function loadUnit(id) {
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-'+id).classList.add('active');
  const u = UNITS.find(x=>x.id===id);
  document.getElementById('breadcrumb').innerHTML = `Unit ${u.id} / <strong>${u.title}</strong>`;
  const cont = document.getElementById('content');

  const typeCount = {short:0,medium:0,long:0};
  let totalQ = 0;
  u.sections.forEach(s => { typeCount[s.type] += s.questions.length; totalQ += s.questions.length; });

  cont.innerHTML = `
    <div class="unit-hero">
      <div class="unit-hero-tag">Unit ${u.id}</div>
      <h1>${u.title}</h1>
      <p>${u.desc}</p>
      <div class="unit-stats">
        <div class="stat-pill">📋 <span>${totalQ}</span> Questions</div>
        <div class="stat-pill tag-easy">1-3 Marks: <span>${typeCount.short}</span></div>
        <div class="stat-pill tag-mid">4-6 Marks: <span>${typeCount.medium}</span></div>
        <div class="stat-pill tag-hard">7-10 Marks: <span>${typeCount.long}</span></div>
      </div>
    </div>
  `;

  u.sections.forEach((sec, si) => {
    const tagClass = {short:'tag-short',medium:'tag-medium',long:'tag-long'}[sec.type];
    const tagLabel = {short:'Short (1-3)',medium:'Medium (4-6)',long:'Long (7-10)'}[sec.type];

    const secEl = document.createElement('div');
    secEl.className = 'section';
    secEl.id = `sec-${id}-${si}`;

    secEl.innerHTML = `
      <div class="section-header" onclick="toggleSection('sec-${id}-${si}')">
        <span class="section-tag ${tagClass}">${tagLabel}</span>
        <span class="section-title">${sec.title}</span>
        <span class="section-marks">${sec.questions.length}Q</span>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="section-body">
        <div class="tab-strip">
          ${sec.questions.map((q,qi)=>`<button class="tab-btn${qi===0?' active':''}" onclick="switchTab(event,'sec-${id}-${si}',${qi})">Q${qi+1}</button>`).join('')}
        </div>
        ${sec.questions.map((q,qi)=>`
          <div class="tab-content${qi===0?' active':''}" id="tc-sec-${id}-${si}-${qi}">
            <div class="question-card">
              <div class="q-label">Question ${qi+1}</div>
              <div class="q-text">${q.q}</div>
              <button class="answer-btn" onclick="toggleAnswer(this)">▶ Show Answer</button>
              <div class="answer-content">
                <div class="tab-strip" style="margin:0 -18px;padding:0 18px">
                  ${q.tabs.map((t,ti)=>`<button class="tab-btn${ti===0?' active':''}" onclick="switchInnerTab(event,this)">${t.label}</button>`).join('')}
                </div>
                ${q.tabs.map((t,ti)=>`<div class="tab-content${ti===0?' active':''}">${t.html}</div>`).join('')}
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    cont.appendChild(secEl);
  });

  if(window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleSection(id) {
  document.getElementById(id).classList.toggle('open');
}

function switchTab(e, secId, qi) {
  const strip = e.target.closest('.tab-strip');
  strip.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  const sec = document.getElementById(secId);
  sec.querySelectorAll('.section-body > .tab-content').forEach(t=>t.classList.remove('active'));
  const prefix = `tc-${secId}-${qi}`;
  sec.querySelector(`#${prefix}`)?.classList.add('active');
}

function switchInnerTab(e, btn) {
  const strip = btn.closest('.tab-strip');
  strip.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const answerContent = btn.closest('.answer-content');
  const idx = Array.from(strip.querySelectorAll('.tab-btn')).indexOf(btn);
  answerContent.querySelectorAll(':scope > .tab-content').forEach((t,i)=>{
    t.classList.toggle('active', i===idx);
  });
}

function toggleAnswer(btn) {
  const ac = btn.nextElementSibling;
  const isVisible = ac.classList.contains('visible');
  ac.classList.toggle('visible', !isVisible);
  btn.textContent = isVisible ? '▶ Show Answer' : '▼ Hide Answer';
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('pre').innerText;
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent = 'Copied!';
    setTimeout(()=>btn.textContent='Copy', 1500);
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function handleSearch(val) {
  if(!val.trim()) return;
  const q = val.toLowerCase();
  let found = false;
  UNITS.forEach(u => {
    u.sections.forEach(sec => {
      sec.questions.forEach(question => {
        if(question.q.toLowerCase().includes(q)) found = true;
      });
    });
  });
}

window.onscroll = () => {
  document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 400);
};

buildNav();
loadUnit(1);
</script>
</body>
</html>
